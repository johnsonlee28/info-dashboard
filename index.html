<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知行社 · 信息中台</title>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #14141f;
    --surface2: #1a1a28;
    --border: #252535;
    --text: #e8e8f0;
    --muted: #666680;
    --accent: #7c6ff7;
    --accent2: #5ba4f5;
    --green: #4caf88;
    --yellow: #f0b429;
    --red: #f05252;
    --orange: #f07a30;
    --tag-bg: #1e1e30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 22px; }
  .title-block h1 { font-size: 17px; font-weight: 700; }
  .title-block p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .updated { font-size: 12px; color: var(--muted); }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
  .refresh-btn:hover { background: var(--border); }

  /* FILTERS */
  .filters { padding: 14px 24px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* LAYOUT */
  .main { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: calc(100vh - 115px); }

  /* SIDEBAR */
  .sidebar { border-right: 1px solid var(--border); padding: 20px 16px; background: var(--surface); }
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; background: var(--surface2); }
  .stat-label { font-size: 13px; color: var(--muted); }
  .stat-val { font-size: 14px; font-weight: 700; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { padding: 3px 10px; border-radius: 12px; font-size: 12px; background: var(--tag-bg); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; color: var(--muted); }
  .tag:hover, .tag.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .agent-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; }
  .agent-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .agent-name { font-size: 13px; }
  .agent-status { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* FEED */
  .feed { padding: 20px 24px; overflow-y: auto; }
  .date-group { margin-bottom: 28px; }
  .date-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .date-label { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .date-line { flex: 1; height: 1px; background: var(--border); }
  .date-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.15s; position: relative; }
  .card:hover { border-color: #333355; }
  .card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1; }
  .card-category { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .cat-intel { background: rgba(240,80,80,0.15); color: #f05252; }
  .cat-idea { background: rgba(240,180,41,0.15); color: #f0b429; }
  .cat-draft { background: rgba(76,175,136,0.15); color: #4caf88; }
  .cat-todo { background: rgba(124,111,247,0.15); color: #7c6ff7; }
  .cat-news { background: rgba(91,164,245,0.15); color: #5ba4f5; }
  .cat-market { background: rgba(240,122,48,0.15); color: #f07a30; }
  .cat-image { background: rgba(124,111,247,0.15); color: #b39ef7; }
  .card-time { font-size: 11px; color: var(--muted); }
  .card-source { font-size: 11px; color: var(--muted); }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .p-high { background: var(--red); box-shadow: 0 0 6px rgba(240,82,82,0.5); }
  .p-mid { background: var(--yellow); }
  .p-low { background: var(--accent2); }
  .card.p-strip-high { border-left: 3px solid var(--red); }
  .card.p-strip-mid { border-left: 3px solid var(--yellow); }
  .card.p-strip-low { border-left: 3px solid var(--accent2); }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
  .card-body { font-size: 13px; color: #aaaacc; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
  .card-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted); }
  .card-action { font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .card-action:hover { border-color: var(--accent); color: var(--accent); }
  .card-action.primary { border-color: var(--accent); color: var(--accent); }
  .card-action.primary:hover { background: var(--accent); color: #fff; }
  .card-actions { display: flex; gap: 6px; margin-left: auto; }

  /* IMAGE CARD */
  .img-thumb { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: opacity 0.15s; }
  .img-thumb:hover { opacity: 0.85; }

  /* IMAGE GRID VIEW */
  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .img-grid-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.15s; }
  .img-grid-card:hover { border-color: var(--accent); }
  .img-grid-thumb { width: 100%; height: 140px; object-fit: cover; cursor: pointer; }
  .img-grid-info { padding: 10px 12px; }
  .img-grid-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
  .img-grid-actions { display: flex; gap: 6px; }
  .img-grid-btn { flex: 1; font-size: 11px; padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; text-decoration: none; display: block; }
  .img-grid-btn:hover { border-color: var(--accent); color: var(--accent); }
  .img-grid-btn.dl { border-color: var(--green); color: var(--green); }
  .img-grid-btn.dl:hover { background: var(--green); color: #fff; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 780px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; transform: translateY(16px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .modal-title { font-size: 16px; font-weight: 700; flex: 1; }
  .modal-close { background: none; border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn { padding: 7px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.15s; }
  .modal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-btn.accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-btn.accent:hover { background: #6a5fe0; }
  .modal-btn.green { background: var(--green); border-color: var(--green); color: #fff; }
  .modal-btn.green:hover { background: #3e9e72; }

  /* DRAFT CONTENT */
  .draft-content { font-size: 13px; line-height: 1.8; color: #cccce0; white-space: pre-wrap; word-break: break-word; }
  .draft-content h1, .draft-content h2, .draft-content h3 { color: var(--text); margin: 16px 0 8px; }

  /* IMG LIGHTBOX */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; flex-direction: column; gap: 16px; }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 100%; max-height: 75vh; object-fit: contain; border-radius: 8px; }
  .lightbox-actions { display: flex; gap: 12px; }
  .lightbox-btn { padding: 8px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #fff; transition: all 0.15s; text-decoration: none; }
  .lightbox-btn:hover { background: rgba(255,255,255,0.15); }
  .lightbox-btn.green { background: var(--green); border-color: var(--green); }
  .lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .feed { padding: 14px; }
    .header { padding: 12px 16px; }
    .filters { padding: 10px 14px; }
    .img-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🧭</div>
    <div class="title-block">
      <h1>知行社 · 信息中台</h1>
      <p>情报 · 草稿 · 待办 · 创意 · 图库 · 一网打尽</p>
    </div>
  </div>
  <div class="header-right">
    <span class="updated" id="updatedAt">加载中...</span>
    <button class="refresh-btn" onclick="init()">🔄 刷新</button>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">全部</button>
  <button class="filter-btn" data-filter="intel" onclick="setFilter('intel',this)">📰 情报</button>
  <button class="filter-btn" data-filter="idea" onclick="setFilter('idea',this)">💡 创意</button>
  <button class="filter-btn" data-filter="draft" onclick="setFilter('draft',this)">📝 草稿</button>
  <button class="filter-btn" data-filter="todo" onclick="setFilter('todo',this)">✅ 待办</button>
  <button class="filter-btn" data-filter="news" onclick="setFilter('news',this)">🤖 简报</button>
  <button class="filter-btn" data-filter="market" onclick="setFilter('market',this)">📊 市场</button>
  <button class="filter-btn" data-filter="image" onclick="setFilter('image',this)">🖼 图库</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">今日概览</div>
      <div id="statsBox"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">标签筛选</div>
      <div class="tag-cloud" id="tagCloud"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">团队状态</div>
      <div id="agentList"></div>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="empty"><div class="empty-icon">⏳</div><div>加载中...</div></div>
  </div>
</div>

<!-- 草稿详情 Modal -->
<div class="modal-overlay" id="draftModal" onclick="closeDraftModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="draftModalTitle">草稿详情</div>
      <button class="modal-close" onclick="closeDraftModal()">✕</button>
    </div>
    <div class="modal-body">
      <pre class="draft-content" id="draftModalContent"></pre>
    </div>
    <div class="modal-footer">
      <button class="modal-btn" onclick="closeDraftModal()">关闭</button>
      <button class="modal-btn green" id="draftDownloadBtn" onclick="downloadDraft()">⬇ 下载 .md</button>
    </div>
  </div>
</div>

<!-- 图片灯箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-actions">
    <a class="lightbox-btn green" id="lightboxDl" href="" download>⬇ 下载图片</a>
    <button class="lightbox-btn" onclick="closeLightbox()">关闭</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allItems = [];
let currentFilter = 'all';
let currentTag = null;
let _draftContent = '';
let _draftTitle = '';

const CAT_MAP = {
  intel:  { label: '情报',  icon: '📰', cls: 'cat-intel' },
  idea:   { label: '创意',  icon: '💡', cls: 'cat-idea' },
  draft:  { label: '草稿',  icon: '📝', cls: 'cat-draft' },
  todo:   { label: '待办',  icon: '✅', cls: 'cat-todo' },
  news:   { label: 'AI简报',icon: '🤖', cls: 'cat-news' },
  market: { label: '市场',  icon: '📊', cls: 'cat-market' },
  image:  { label: '图片',  icon: '🖼', cls: 'cat-image' },
};

async function init() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    allItems = data.items || [];
    document.getElementById('updatedAt').textContent = '更新于 ' + (data.updatedAt || '--');
    render();
    renderSidebar(data);
  } catch(e) {
    document.getElementById('feed').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>数据加载失败</div></div>';
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  currentTag = null;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  render();
}

function setTag(tag, el) {
  if (currentTag === tag) {
    currentTag = null;
    el.classList.remove('active');
  } else {
    currentTag = tag;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
  render();
}

function render() {
  let filtered = allItems.filter(item => {
    if (currentFilter !== 'all' && item.category !== currentFilter) return false;
    if (currentTag && !(item.tags || []).includes(currentTag)) return false;
    return true;
  });

  if (!filtered.length) {
    document.getElementById('feed').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>暂无相关内容</div></div>';
    return;
  }

  // 图片专用网格视图
  if (currentFilter === 'image') {
    renderImageGrid(filtered);
    return;
  }

  // group by date
  const groups = {};
  filtered.forEach(item => {
    const d = (item.date || '').slice(0,10) || '未知日期';
    if (!groups[d]) groups[d] = [];
    groups[d].push(item);
  });

  const sortedDates = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  let html = '';
  for (const date of sortedDates) {
    const items = groups[date];
    let dateLabel = date;
    if (date === today) dateLabel = '今天 · ' + date;
    else if (date === yesterday) dateLabel = '昨天 · ' + date;

    html += `<div class="date-group">
      <div class="date-header">
        <span class="date-label">${dateLabel}</span>
        <div class="date-line"></div>
        <span class="date-count">${items.length} 条</span>
      </div>`;

    for (const item of items) {
      html += renderCard(item);
    }
    html += '</div>';
  }

  document.getElementById('feed').innerHTML = html;
}

function renderCard(item) {
  const cat = CAT_MAP[item.category] || { label: item.category, icon: '📌', cls: '' };
  const pClass = item.priority === 'high' ? 'p-strip-high' : item.priority === 'mid' ? 'p-strip-mid' : 'p-strip-low';
  const pDot = item.priority === 'high' ? 'p-high' : item.priority === 'mid' ? 'p-mid' : 'p-low';
  const tags = (item.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('');
  const source = item.source ? `<span class="card-source">来源：${item.source}</span>` : '';
  const timeStr = (item.date||'').slice(11,16) || '';

  // 草稿卡片：缩略 + 展开全文+下载按钮
  if (item.category === 'draft') {
    const preview = (item.body || '').slice(0, 200).replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const safeTitle = (item.title || '').replace(/'/g, "\\'");
    const safeBody = (item.body || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
    return `<div class="card ${pClass}">
      <div class="card-top">
        <div class="card-icon">${cat.icon}</div>
        <div class="card-meta">
          <span class="card-category ${cat.cls}">${cat.label}</span>
          ${source}
          <span class="card-time">${timeStr}</span>
        </div>
        <div class="priority-dot ${pDot}"></div>
      </div>
      <div class="card-title">${escHtml(item.title)}</div>
      ${item.body ? `<div class="card-body">${escHtml(preview)}${item.body.length>200?'…':''}</div>` : ''}
      <div class="card-footer">${tags}
        <div class="card-actions">
          <button class="card-action primary" onclick="openDraft('${safeTitle}','${safeBody}')">📖 阅读全文</button>
          <button class="card-action" onclick="downloadDraftInline('${safeTitle}','${safeBody}')">⬇ 下载</button>
        </div>
      </div>
    </div>`;
  }

  // 图片卡片（列表视图）
  if (item.category === 'image') {
    const imgUrl = item.url || '';
    return `<div class="card ${pClass}">
      <div class="card-top">
        <div class="card-icon">${cat.icon}</div>
        <div class="card-meta">
          <span class="card-category ${cat.cls}">${cat.label}</span>
          ${source}
          <span class="card-time">${timeStr}</span>
        </div>
      </div>
      ${imgUrl ? `<img class="img-thumb" src="${imgUrl}" alt="${escHtml(item.title)}" onclick="openLightbox('${imgUrl}','${escHtml(item.title)}')">` : ''}
      <div class="card-title">${escHtml(item.title)}</div>
      <div class="card-footer">${tags}
        <div class="card-actions">
          <button class="card-action" onclick="openLightbox('${imgUrl}','${escHtml(item.title)}')">🔍 放大</button>
          <a class="card-action primary" href="${imgUrl}" download="${item.body||'image.png'}">⬇ 下载</a>
        </div>
      </div>
    </div>`;
  }

  // 普通卡片
  const link = item.url ? `<button class="card-action" onclick="window.open('${item.url}')">查看原文 →</button>` : '';
  return `<div class="card ${pClass}">
    <div class="card-top">
      <div class="card-icon">${cat.icon}</div>
      <div class="card-meta">
        <span class="card-category ${cat.cls}">${cat.label}</span>
        ${source}
        <span class="card-time">${timeStr}</span>
      </div>
      <div class="priority-dot ${pDot}"></div>
    </div>
    <div class="card-title">${escHtml(item.title)}</div>
    ${item.body ? `<div class="card-body">${escHtml(item.body.slice(0,200))}${item.body.length>200?'…':''}</div>` : ''}
    <div class="card-footer">${tags}${link}</div>
  </div>`;
}

function renderImageGrid(items) {
  let html = '<div class="img-grid">';
  for (const item of items) {
    const imgUrl = item.url || '';
    const fname = item.body || 'image.png';
    const safeTitle = item.title.replace(/'/g,"\\'");
    html += `<div class="img-grid-card">
      <img class="img-grid-thumb" src="${imgUrl}" alt="${escHtml(item.title)}" loading="lazy"
           onclick="openLightbox('${imgUrl}','${safeTitle}','${fname}')">
      <div class="img-grid-info">
        <div class="img-grid-name" title="${escHtml(item.title)}">${escHtml(item.title)}</div>
        <div class="img-grid-actions">
          <a class="img-grid-btn dl" href="${imgUrl}" download="${fname}">⬇ 下载</a>
          <button class="img-grid-btn" onclick="openLightbox('${imgUrl}','${safeTitle}','${fname}')">🔍 放大</button>
        </div>
      </div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('feed').innerHTML = html;
}

// ─── Draft Modal ──────────────────────────────────────────────────────────────
function openDraft(title, bodyEncoded) {
  _draftTitle = title;
  _draftContent = bodyEncoded.replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/\\\\/g,'\\');
  document.getElementById('draftModalTitle').textContent = title;
  document.getElementById('draftModalContent').textContent = _draftContent;
  document.getElementById('draftModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDraftModal(e) {
  if (e && e.target !== document.getElementById('draftModal')) return;
  document.getElementById('draftModal').classList.remove('open');
  document.body.style.overflow = '';
}

function downloadDraft() {
  downloadDraftInline(_draftTitle, _draftContent, true);
}

function downloadDraftInline(title, body, alreadyDecoded) {
  const content = alreadyDecoded ? body : body.replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/\\\\/g,'\\');
  const blob = new Blob([content], {type: 'text/markdown;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (title || 'draft').replace(/[《》\s\/\\]/g, '_') + '.md';
  a.click();
  showToast('✅ 下载完成');
}

// ─── Lightbox ─────────────────────────────────────────────────────────────────
function openLightbox(url, title, fname) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightboxDl').href = url;
  document.getElementById('lightboxDl').download = fname || 'image.png';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.closest('.lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(data) {
  const counts = {};
  allItems.forEach(i => { counts[i.category] = (counts[i.category]||0)+1; });
  let statsHtml = '';
  for (const [k,v] of Object.entries(CAT_MAP)) {
    if (counts[k]) {
      statsHtml += `<div class="stat-row"><span class="stat-label">${v.icon} ${v.label}</span><span class="stat-val">${counts[k]}</span></div>`;
    }
  }
  document.getElementById('statsBox').innerHTML = statsHtml || '<div style="color:var(--muted);font-size:13px">暂无数据</div>';

  const tagCount = {};
  allItems.forEach(i => (i.tags||[]).forEach(t => { tagCount[t]=(tagCount[t]||0)+1; }));
  const sortedTags = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,20);
  document.getElementById('tagCloud').innerHTML = sortedTags.map(([t,c]) =>
    `<span class="tag" onclick="setTag('${t}',this)">${t} <span style="opacity:0.5">${c}</span></span>`
  ).join('');

  const agents = data.agents || [];
  document.getElementById('agentList').innerHTML = agents.map(a =>
    `<div class="agent-item">
      <div class="agent-dot" style="${a.status!=='在线'?'background:var(--red)':''}"></div>
      <span class="agent-name">${a.name} <span style="color:var(--muted);font-size:11px">${a.role}</span></span>
      <span class="agent-status">${a.status}</span>
    </div>`
  ).join('');
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ESC 关闭
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeDraftModal();
    closeLightbox();
  }
});

init();
</script>
</body>
</html>
